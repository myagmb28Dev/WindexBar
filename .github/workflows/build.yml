name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        shell: pwsh
        run: dotnet restore .\WindexBar.slnx -p:NuGetAudit=false

      - name: Test
        shell: pwsh
        run: >
          dotnet test .\tests\WindexBar.Core.Tests\WindexBar.Core.Tests.csproj
          --no-restore
          --nologo
          --verbosity minimal
          --disable-build-servers
          -m:1
          -p:BuildInParallel=false
          -p:UseSharedCompilation=false
          -p:NuGetAudit=false
