name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  release:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Resolve release version
        id: release
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.Trim()
          if ($version.StartsWith('v', [StringComparison]::OrdinalIgnoreCase)) {
            $version = $version.Substring(1)
          }

          if ($version -notmatch '^\d+\.\d+(\.\d+)?([-.+][0-9A-Za-z.-]+)?$') {
            throw "Tag must look like v1.2 or v1.2.3. Received: $env:GITHUB_REF_NAME"
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Import code signing certificate
        shell: pwsh
        env:
          WINDOWS_CODESIGN_PFX_BASE64: ${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 }}
          WINDOWS_CODESIGN_PFX_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PFX_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CODESIGN_PFX_BASE64)) {
            Write-Warning 'WINDOWS_CODESIGN_PFX_BASE64 is not set. Installer will be built without a CI-provided signing certificate.'
            return
          }

          $pfxPath = Join-Path $env:RUNNER_TEMP 'windexbar-codesign.pfx'
          $bytes = [Convert]::FromBase64String($env:WINDOWS_CODESIGN_PFX_BASE64)
          [IO.File]::WriteAllBytes($pfxPath, $bytes)

          if ([string]::IsNullOrEmpty($env:WINDOWS_CODESIGN_PFX_PASSWORD)) {
            $password = New-Object System.Security.SecureString
          } else {
            $password = ConvertTo-SecureString $env:WINDOWS_CODESIGN_PFX_PASSWORD -AsPlainText -Force
          }

          try {
            Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $password | Out-Null
          } finally {
            Remove-Item -LiteralPath $pfxPath -Force -ErrorAction SilentlyContinue
          }

      - name: Restore
        shell: pwsh
        run: dotnet restore .\WindexBar.slnx -p:NuGetAudit=false

      - name: Test
        shell: pwsh
        run: >
          dotnet test .\tests\WindexBar.Core.Tests\WindexBar.Core.Tests.csproj
          --no-restore
          --nologo
          --verbosity minimal
          --disable-build-servers
          -m:1
          -p:BuildInParallel=false
          -p:UseSharedCompilation=false
          -p:NuGetAudit=false

      - name: Build installer
        shell: cmd
        run: build-installer.cmd ${{ steps.release.outputs.version }}

      - name: Create signed update manifest
        id: installer
        shell: pwsh
        env:
          WINDEXBAR_UPDATE_SIGNING_KEY: ${{ secrets.WINDEXBAR_UPDATE_SIGNING_KEY }}
          WINDEXBAR_UPDATE_SIGNING_KEY_RECOVERY: ${{ secrets.WINDEXBAR_UPDATE_SIGNING_KEY_RECOVERY }}
        run: |
          $installer = Get-ChildItem -Path .\artifacts\installer -Filter WindexBarSetup.exe -Recurse |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $installer) {
            throw 'WindexBarSetup.exe was not produced.'
          }

          $hash = (Get-FileHash -Path $installer.FullName -Algorithm SHA256).Hash
          $encodedKey = $env:WINDEXBAR_UPDATE_SIGNING_KEY
          if ([string]::IsNullOrWhiteSpace($encodedKey)) {
            $encodedKey = $env:WINDEXBAR_UPDATE_SIGNING_KEY_RECOVERY
          }
          if ([string]::IsNullOrWhiteSpace($encodedKey)) {
            throw 'Neither WindexBar update signing key secret is configured.'
          }

          try {
            $key = $encodedKey | ConvertFrom-Json
            $parameters = [Security.Cryptography.RSAParameters]::new()
            $parameters.Modulus = [Convert]::FromBase64String($key.Modulus)
            $parameters.Exponent = [Convert]::FromBase64String($key.Exponent)
            $parameters.D = [Convert]::FromBase64String($key.D)
            $parameters.P = [Convert]::FromBase64String($key.P)
            $parameters.Q = [Convert]::FromBase64String($key.Q)
            $parameters.DP = [Convert]::FromBase64String($key.DP)
            $parameters.DQ = [Convert]::FromBase64String($key.DQ)
            $parameters.InverseQ = [Convert]::FromBase64String($key.InverseQ)
          } catch {
            throw "WINDEXBAR_UPDATE_SIGNING_KEY is invalid: $($_.Exception.Message)"
          }

          $manifestPath = Join-Path $installer.DirectoryName 'update.json'
          $signaturePath = Join-Path $installer.DirectoryName 'update.sig'
          $manifest = [ordered]@{
            schemaVersion = 1
            version = '${{ steps.release.outputs.version }}'
            installer = 'WindexBarSetup.exe'
            sha256 = $hash
          } | ConvertTo-Json -Compress
          $utf8 = [Text.UTF8Encoding]::new($false)
          [IO.File]::WriteAllText($manifestPath, $manifest, $utf8)

          $rsa = [Security.Cryptography.RSA]::Create()
          try {
            $rsa.ImportParameters($parameters)
            $manifestBytes = $utf8.GetBytes($manifest)
            $signatureBytes = $rsa.SignData(
              $manifestBytes,
              [Security.Cryptography.HashAlgorithmName]::SHA256,
              [Security.Cryptography.RSASignaturePadding]::Pkcs1)
            [IO.File]::WriteAllText($signaturePath, [Convert]::ToBase64String($signatureBytes), $utf8)
          } finally {
            $rsa.Dispose()
          }

          "path=$($installer.FullName)" >> $env:GITHUB_OUTPUT
          "manifest_path=$manifestPath" >> $env:GITHUB_OUTPUT
          "signature_path=$signaturePath" >> $env:GITHUB_OUTPUT
          "sha256=$hash" >> $env:GITHUB_OUTPUT

          Write-Host "Installer: $($installer.FullName)"
          Write-Host "SHA256: $hash"
          Write-Host 'Signed update manifest created.'

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: WindexBarSetup-${{ steps.release.outputs.version }}
          path: |
            ${{ steps.installer.outputs.path }}
            ${{ steps.installer.outputs.manifest_path }}
            ${{ steps.installer.outputs.signature_path }}
          if-no-files-found: error

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = '${{ steps.release.outputs.tag }}'
          $version = '${{ steps.release.outputs.version }}'
          $installer = '${{ steps.installer.outputs.path }}'
          $notesPath = Join-Path $env:RUNNER_TEMP 'release-notes.md'

          function Get-ReleaseNoteSection {
            param([string]$Item)

            $normalized = $Item.ToLowerInvariant()
            if ($normalized -match '^(fix|hotfix|repair|avoid|silence|resolve|restore)\b' -or
                $normalized -match '\b(hotfix|bug|crash|warning|blocked|failure|error)\b') {
              return 'Hotfix:'
            }

            if ($normalized -match '^(add|adds|added|support|enable|introduce)\b') {
              return 'Added:'
            }

            return 'Changed:'
          }

          function Remove-ReleaseNoteAttribution {
            param([string]$Item)

            return ($Item -replace '\s+by\s+@[^\s]+\s+in\s+#\d+\s*$', '').Trim()
          }

          function Add-ReleaseNoteSections {
            param(
              [System.Collections.Generic.List[string]]$Output,
              [System.Collections.Specialized.OrderedDictionary]$Sections
            )

            $wroteSection = $false
            foreach ($section in $Sections.Keys) {
              $items = $Sections[$section]
              if ($items.Count -eq 0) {
                continue
              }

              if ($wroteSection) {
                [void]$Output.Add('')
                [void]$Output.Add('---')
                [void]$Output.Add('')
              } elseif ($Output.Count -gt 0 -and -not [string]::IsNullOrWhiteSpace($Output[$Output.Count - 1])) {
                [void]$Output.Add('')
              }

              [void]$Output.Add($section)
              foreach ($item in $items) {
                [void]$Output.Add("- $item")
              }

              $wroteSection = $true
            }
          }

          function Convert-ReleaseNotesSections {
            param([string]$Body)

            $lines = $Body -split '\r?\n'
            $output = [System.Collections.Generic.List[string]]::new()
            $sections = [ordered]@{
              'Added:' = [System.Collections.Generic.List[string]]::new()
              'Hotfix:' = [System.Collections.Generic.List[string]]::new()
              'Changed:' = [System.Collections.Generic.List[string]]::new()
            }
            $insideChanges = $false

            foreach ($line in $lines) {
              if ($line -match '^##\s+What''s Changed\s*$') {
                $insideChanges = $true
                [void]$output.Add($line)
                continue
              }

              if ($insideChanges) {
                if ($line -match '^##\s+') {
                  Add-ReleaseNoteSections -Output $output -Sections $sections
                  $insideChanges = $false
                  [void]$output.Add('')
                  [void]$output.Add($line)
                  continue
                }

                if ([string]::IsNullOrWhiteSpace($line)) {
                  continue
                }

                if ($line -match '^\s*[-*]\s+(?<item>.+)$') {
                  $item = Remove-ReleaseNoteAttribution $Matches.item.Trim()
                  $section = Get-ReleaseNoteSection $item
                  if ($section -eq 'Added:') {
                    $item = ($item -replace '^(?i)(add|adds|added)\s+', '').Trim()
                  }

                  [void]$sections[$section].Add($item)
                  continue
                }
              }

              [void]$output.Add($line)
            }

            if ($insideChanges) {
              Add-ReleaseNoteSections -Output $output -Sections $sections
            }

            return ($output -join [Environment]::NewLine).TrimEnd()
          }

          $generatedNotes = @(gh api "repos/$env:GITHUB_REPOSITORY/releases/generate-notes" -f tag_name="$tag" --jq .body)
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $body = $generatedNotes -join [Environment]::NewLine

          $body = $body -replace '(?ms)\r?\n*\*\*Full Changelog\*\*:.*$', ''
          $body = Convert-ReleaseNotesSections $body
          $body = $body.TrimEnd()
          if ([string]::IsNullOrWhiteSpace($body)) {
            $body = "WindexBar $version"
          }

          Set-Content -LiteralPath $notesPath -Value $body -NoNewline

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          $releaseExists = $LASTEXITCODE -eq 0

          if ($releaseExists) {
            $assetNames = @(gh release view $tag --repo $env:GITHUB_REPOSITORY --json assets --jq '.assets[].name')
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            if ($assetNames -contains 'WindexBarSetup.exe' -or $assetNames -contains 'update.json' -or $assetNames -contains 'update.sig') {
              throw "WindexBar update assets already exist for $tag. Published release assets are immutable; create a new version instead."
            }

            gh release edit $tag --repo $env:GITHUB_REPOSITORY --title "WindexBar $version" --notes-file "$notesPath" --draft=true
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } else {
            gh release create $tag --repo $env:GITHUB_REPOSITORY --verify-tag --title "WindexBar $version" --notes-file "$notesPath" --draft
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

          $manifest = '${{ steps.installer.outputs.manifest_path }}'
          $signature = '${{ steps.installer.outputs.signature_path }}'
          gh release upload $tag "$installer#WindexBarSetup.exe" "$manifest#update.json" "$signature#update.sig" --repo $env:GITHUB_REPOSITORY
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          gh release edit $tag --repo $env:GITHUB_REPOSITORY --draft=false
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

  submit-winget:
    name: Submit WinGet update
    needs: release
    runs-on: windows-latest
    env:
      WINGET_CREATE_GITHUB_TOKEN: ${{ secrets.WINGET_TOKEN }}

    steps:
      - name: Check WinGet submission configuration
        id: winget
        shell: pwsh
        run: |
          function Get-OpenWindexBarWingetPullRequest {
            $query = [Uri]::EscapeDataString('repo:microsoft/winget-pkgs is:pr is:open in:title "myagmb28Dev.WindexBar"')
            $headers = @{
              Accept = 'application/vnd.github+json'
              Authorization = "Bearer $env:WINGET_CREATE_GITHUB_TOKEN"
              'User-Agent' = 'WindexBar-release-workflow'
              'X-GitHub-Api-Version' = '2022-11-28'
            }

            try {
              $result = Invoke-RestMethod -Uri "https://api.github.com/search/issues?q=$query&per_page=1" -Headers $headers
              return @($result.items) | Select-Object -First 1
            } catch {
              Write-Warning "Could not check for an existing WinGet PR. Submission will still be attempted. $($_.Exception.Message)"
              return $null
            }
          }

          if ([string]::IsNullOrWhiteSpace($env:WINGET_CREATE_GITHUB_TOKEN)) {
            Write-Warning 'WINGET_TOKEN is not configured. Skipping the WinGet update submission.'
            'enabled=false' >> $env:GITHUB_OUTPUT
            '### WinGet submission skipped' >> $env:GITHUB_STEP_SUMMARY
            'Add the `WINGET_TOKEN` repository secret before the next release to enable automatic update PRs.' >> $env:GITHUB_STEP_SUMMARY
            return
          }

          $openPullRequest = Get-OpenWindexBarWingetPullRequest
          if ($openPullRequest) {
            Write-Host "An open WindexBar WinGet PR is still awaiting review: $($openPullRequest.html_url)"
            'enabled=false' >> $env:GITHUB_OUTPUT
            '### WinGet submission deferred' >> $env:GITHUB_STEP_SUMMARY
            "An existing WindexBar WinGet PR is still open: $($openPullRequest.html_url)" >> $env:GITHUB_STEP_SUMMARY
            'The release remains successful and a later release will retry after that PR is resolved.' >> $env:GITHUB_STEP_SUMMARY
            return
          }

          'enabled=true' >> $env:GITHUB_OUTPUT

      - name: Download WinGetCreate
        if: steps.winget.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $toolPath = Join-Path $env:RUNNER_TEMP 'wingetcreate.exe'
          Invoke-WebRequest -Uri 'https://aka.ms/wingetcreate/latest' -OutFile $toolPath

      - name: Submit WinGet update
        if: steps.winget.outputs.enabled == 'true'
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ needs.release.outputs.version }}
          RELEASE_TAG: ${{ needs.release.outputs.tag }}
        run: |
          function Get-OpenWindexBarWingetPullRequest {
            $query = [Uri]::EscapeDataString('repo:microsoft/winget-pkgs is:pr is:open in:title "myagmb28Dev.WindexBar"')
            $headers = @{
              Accept = 'application/vnd.github+json'
              Authorization = "Bearer $env:WINGET_CREATE_GITHUB_TOKEN"
              'User-Agent' = 'WindexBar-release-workflow'
              'X-GitHub-Api-Version' = '2022-11-28'
            }

            try {
              $result = Invoke-RestMethod -Uri "https://api.github.com/search/issues?q=$query&per_page=1" -Headers $headers
              return @($result.items) | Select-Object -First 1
            } catch {
              Write-Warning "Could not recheck for an existing WinGet PR. $($_.Exception.Message)"
              return $null
            }
          }

          $toolPath = Join-Path $env:RUNNER_TEMP 'wingetcreate.exe'
          $installerUrl = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$env:RELEASE_TAG/WindexBarSetup.exe"
          $releaseNotesUrl = "https://github.com/$env:GITHUB_REPOSITORY/releases/tag/$env:RELEASE_TAG"
          $releaseDate = Get-Date -AsUTC -Format 'yyyy-MM-dd'
          $arguments = @(
            'update'
            'myagmb28Dev.WindexBar'
            '--urls', $installerUrl
            '--version', $env:RELEASE_VERSION
            '--release-notes-url', $releaseNotesUrl
            '--release-date', $releaseDate
            '--prtitle', "New version: myagmb28Dev.WindexBar version $env:RELEASE_VERSION"
            '--submit'
            '--no-open'
          )

          & $toolPath @arguments
          $submitExitCode = $LASTEXITCODE
          if ($submitExitCode -ne 0) {
            $openPullRequest = Get-OpenWindexBarWingetPullRequest
            if ($openPullRequest) {
              Write-Warning "WinGetCreate returned $submitExitCode, but a WindexBar PR is open and awaiting review: $($openPullRequest.html_url)"
              '### WinGet submission deferred' >> $env:GITHUB_STEP_SUMMARY
              "An existing WindexBar WinGet PR is still open: $($openPullRequest.html_url)" >> $env:GITHUB_STEP_SUMMARY
              'The release remains successful and a later release will retry after that PR is resolved.' >> $env:GITHUB_STEP_SUMMARY
              exit 0
            }

            exit $submitExitCode
          }
